name: Update Bangumi Data

on:
  schedule:
    # Beijing time: every Monday 00:00.
    - cron: '0 16 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-bangumi-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate seed data
        run: npm run data:seed
        env:
          TZ: Asia/Shanghai

      - name: Commit updated data
        run: |
          if git diff --quiet -- public/anime-seed.json public/anime-seed-meta.json; then
            echo "Bangumi data is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/anime-seed.json public/anime-seed-meta.json
          git commit -m "Update Bangumi seed data"
          git push
